[build]
  publish = "site"

# SPA redirect — send all paths to index.html for Docsify routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache headers for development convenience
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"
